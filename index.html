<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattress Fiberglass SafeGuard | Gemini 3 Hackathon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0a0a0c',
              surface: '#16161a',
              primary: '#6366f1',
              secondary: '#d946ef',
              accent: '#22d3ee',
              danger: '#f43f5e',
              success: '#10b981',
              text: '#f8fafc',
              muted: '#94a3b8',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Bebas Neue', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
      body { background-color: #0a0a0c; color: #f8fafc; margin: 0; padding: 0; }
      .glass-card { background: rgba(22, 22, 26, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
      .neuro-btn { background: #16161a; border-radius: 12px; box-shadow: 4px 4px 8px #050505, -4px -4px 8px #27272f; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
      .neuro-btn:active { box-shadow: inset 2px 2px 4px #050505, inset -2px -2px 4px #27272f; transform: scale(0.98); }
      .gradient-text { background: linear-gradient(to right, #6366f1, #d946ef, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .neuro-inset { background: #0a0a0c; box-shadow: inset 2px 2px 5px #050505, inset -2px -2px 5px #1a1a20; border: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>

</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
